<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YBG13™ | ARTEX AI Code Generator</title>
    <style>
        /* Apple-Style Minimalist Tasarım */
        :root {
            --apple-blue: #0071e3;
            --bg-light: #f5f5f7;
            --card-bg: #ffffff;
            --text-main: #1d1d1f;
            --text-secondary: #86868b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-light);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        /* API Key Ayar Bölümü */
        .api-settings {
            background: #fff;
            padding: 15px 25px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
        }

        .api-settings input {
            flex: 1;
            padding: 10px;
            border: 1px solid #d2d2d7;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
        }

        /* Ana Panel */
        .main-card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 28px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.05);
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 34px;
            font-weight: 600;
            letter-spacing: -0.8px;
            margin-bottom: 10px;
        }

        header p {
            color: var(--text-secondary);
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        textarea {
            width: 100%;
            height: 140px;
            padding: 20px;
            border: 1px solid #d2d2d7;
            border-radius: 16px;
            font-size: 17px;
            background: #fcfcfd;
            resize: none;
            outline: none;
            transition: 0.3s;
        }

        textarea:focus {
            border-color: var(--apple-blue);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.1);
        }

        button {
            padding: 16px;
            background: var(--apple-blue);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        button:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        /* Çıktı Alanı */
        .output-container {
            margin-top: 30px;
            background: #1e1e1e;
            border-radius: 16px;
            overflow: hidden;
            display: none;
        }

        .output-header {
            background: #333;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            color: #fff;
            font-size: 13px;
        }

        pre {
            padding: 20px;
            color: #d4d4d4;
            overflow-x: auto;
            font-family: 'SFMono-Regular', Consolas, monospace;
            font-size: 14px;
            line-height: 1.6;
        }

        footer {
            text-align: center;
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 20px;
        }

        .loader {
            display: none;
            text-align: center;
            padding: 20px;
            font-weight: 500;
            color: var(--apple-blue);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="api-settings">
        <span style="font-size: 13px; font-weight: 600;">API ANAHTARI:</span>
        <input type="password" id="apiKeyInput" placeholder="Anahtarınızı buraya yapıştırın (Tarayıcıda saklanır)">
        <button id="saveKeyBtn" style="padding: 8px 15px; font-size: 12px;">Kaydet</button>
    </div>

    <div class="main-card">
        <header>
            <h1>Yazılım Yapay Zekası</h1>
            <p>Hangi yazılım projesini başlatıyoruz?</p>
        </header>

        <div class="input-group">
            <textarea id="userInput" placeholder="Örn: Modern bir fotoğraf galeri bileşeni yaz. Minimalist olsun."></textarea>
            <button id="generateBtn">Kodu Oluştur</button>
        </div>

        <div id="loader" class="loader">Kodlar yazılıyor, lütfen bekleyin...</div>

        <div id="outputSection" class="output-container">
            <div class="output-header">
                <span>YBG13™ AI Engine v1.0</span>
                <span id="copyBtn" style="cursor:pointer; color: #0071e3;">Kodu Kopyala</span>
            </div>
            <pre id="codeOutput"></pre>
        </div>
    </div>

    <footer>
        <p>© 2026 YBG13™ - ARTEX</p>
    </footer>
</div>

<script>
    // 1. Ayarları Yönet
    const apiKeyInput = document.getElementById('apiKeyInput');
    const saveKeyBtn = document.getElementById('saveKeyBtn');

    // Sayfa açıldığında varsa anahtarı getir
    window.onload = () => {
        const savedKey = localStorage.getItem('ybg13_ai_key');
        if (savedKey) {
            apiKeyInput.value = savedKey;
        }
    };

    saveKeyBtn.onclick = () => {
        localStorage.setItem('ybg13_ai_key', apiKeyInput.value);
        alert("API Anahtarı tarayıcıya güvenle kaydedildi!");
    };

    // 2. AI İşlemleri
    const generateBtn = document.getElementById('generateBtn');
    const userInput = document.getElementById('userInput');
    const codeOutput = document.getElementById('codeOutput');
    const outputSection = document.getElementById('outputSection');
    const loader = document.getElementById('loader');

    const systemInstruction = "Sen bir Senior Full-Stack Yazılım Uzmanısın. Sadece HTML, CSS ve JavaScript kullanarak modern, premium beyaz temalı (Apple tarzı) kodlar yazarsın. Kodlar temiz ve çalışmaya hazır olmalı. Hiçbir açıklama yapma, sadece kodları ver.";

    generateBtn.onclick = async () => {
        const key = localStorage.getItem('ybg13_ai_key');
        if (!key) return alert("Lütfen önce API anahtarınızı girin ve kaydedin!");

        const prompt = userInput.value.trim();
        if (!prompt) return alert("Lütfen ne yazılacağını belirtin.");

        // UI Güncelle
        generateBtn.disabled = true;
        loader.style.display = "block";
        outputSection.style.display = "none";

        const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`;

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{
                        parts: [{ text: `${systemInstruction}\n\nİstek: ${prompt}` }]
                    }]
                })
            });

            const data = await response.json();
            
            if (data.error) {
                throw new Error(data.error.message);
            }

            const result = data.candidates[0].content.parts[0].text;
            codeOutput.innerText = result;
            outputSection.style.display = "block";

        } catch (error) {
            alert("Hata: " + error.message);
        } finally {
            generateBtn.disabled = false;
            loader.style.display = "none";
        }
    };

    // Kopyalama Fonksiyonu
    document.getElementById('copyBtn').onclick = () => {
        navigator.clipboard.writeText(codeOutput.innerText);
        alert("Kod başarıyla kopyalandı!");
    };
</script>

</body>
</html>
