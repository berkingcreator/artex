<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YBG13™ | Artex </title>
    <style>
        /* Apple Tarzı Minimalist Tasarım */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: #fbfbfd;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #1d1d1f;
        }

        .container {
            width: 95%;
            max-width: 1000px;
            background: #ffffff;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.05);
            border: 1px solid #f2f2f2;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 32px;
            font-weight: 600;
            letter-spacing: -0.5px;
            margin-bottom: 10px;
        }

        header p {
            color: #86868b;
            font-size: 16px;
        }

        .input-section {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }

        textarea {
            width: 100%;
            height: 150px;
            padding: 20px;
            border: 1px solid #d2d2d7;
            border-radius: 18px;
            font-size: 17px;
            outline: none;
            transition: all 0.3s ease;
            background: #fcfcfd;
        }

        textarea:focus {
            border-color: #0071e3;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.1);
        }

        #generateBtn {
            padding: 16px;
            background-color: #0071e3;
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
        }

        #generateBtn:hover {
            background-color: #0077ed;
            transform: scale(1.01);
        }

        #generateBtn:disabled {
            background-color: #a1a1a6;
            cursor: not-allowed;
        }

        .output-section {
            background: #1e1e1e;
            border-radius: 18px;
            overflow: hidden;
            display: none; /* Başlangıçta gizli */
        }

        .code-header {
            background: #333333;
            padding: 12px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #e0e0e0;
            font-size: 14px;
        }

        pre {
            padding: 25px;
            overflow-x: auto;
            color: #d4d4d4;
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
            line-height: 1.6;
            font-size: 15px;
        }

        footer {
            margin-top: 40px;
            text-align: center;
            font-size: 13px;
            color: #86868b;
        }

        /* Loading animasyonu */
        .loader {
            display: none;
            text-align: center;
            margin: 20px 0;
            color: #0071e3;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Yazılım Yapay Zekası</h1>
            <p>YBG13™ Teknolojisi ile kod üretin.</p>
        </header>

        <main>
            <div class="input-section">
                <textarea id="userInput" placeholder="Hangi kodları yazmamı istersiniz? (Örn: Modern bir navigasyon çubuğu yap)"></textarea>
                <button id="generateBtn">Kodu Yazmaya Başla</button>
            </div>

            <div id="loader" class="loader">Yapay zeka kodu yazıyor...</div>

            <div id="outputSection" class="output-section">
                <div class="code-header">
                    <span>Oluşturulan Kaynak Kodları</span>
                    <button id="copyBtn" style="background:none; border:1px solid #555; color:white; padding:5px 10px; border-radius:5px; cursor:pointer;">Kopyala</button>
                </div>
                <pre id="codeOutput"><code></code></pre>
            </div>
        </main>

        <footer>
            <p>© 2026 YBG13™ - Tüm Hakları Saklıdır.</p>
        </footer>
    </div>

    <script>
        const API_KEY = "AIzaSyCE6ePiS05D3ijKbnzpWe7U_eS5Sq3W7tg";
        const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

        const generateBtn = document.getElementById('generateBtn');
        const userInput = document.getElementById('userInput');
        const codeOutput = document.getElementById('codeOutput');
        const outputSection = document.getElementById('outputSection');
        const loader = document.getElementById('loader');

        // AI'ya ne yapması gerektiğini öğreten SİSTEM TALİMATI
        const systemInstruction = "Sen uzman bir Senior Full-Stack Yazılım Geliştiricisisin. Sadece HTML, CSS ve JavaScript kodları yazarsın. Kodların modern, minimalist (Apple tarzı) ve profesyonel olmalı. Açıklama yapma, sadece kod bloğunu ver.";

        generateBtn.addEventListener('click', async () => {
            const prompt = userInput.value.trim();
            if (!prompt) return alert("Lütfen bir komut girin!");

            // UI Hazırlığı
            generateBtn.disabled = true;
            loader.style.display = "block";
            outputSection.style.display = "none";

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{ text: `${systemInstruction}\n\nKullanıcı İsteği: ${prompt}` }]
                        }]
                    })
                });

                const data = await response.json();
                const aiResponse = data.candidates[0].content.parts[0].text;

                // Çıktıyı göster
                codeOutput.innerText = aiResponse;
                outputSection.style.display = "block";
            } catch (error) {
                console.error("Hata oluştu:", error);
                alert("Kod oluşturulurken bir hata oluştu. API anahtarınızı veya bağlantınızı kontrol edin.");
            } finally {
                generateBtn.disabled = false;
                loader.style.display = "none";
            }
        });

        document.getElementById('copyBtn').addEventListener('click', () => {
            navigator.clipboard.writeText(codeOutput.innerText);
            alert("Kod kopyalandı!");
        });
    </script>
</body>
</html>
